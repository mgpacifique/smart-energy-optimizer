# nginx/lb01.conf
# Load balancer config for Lb01
# Distributes traffic between Web01 and Web02
#
# Deploy to: /etc/nginx/sites-available/energy-optimizer
# Then: sudo ln -s /etc/nginx/sites-available/energy-optimizer /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Replace WEB01_IP and WEB02_IP with your actual server IPs.

upstream energy_backend {
    server WEB01_IP:8000 weight=1;
    server WEB02_IP:8000 weight=1;

    keepalive 32;
}

server {
    listen 80;
    server_name LB01_IP;        # replace with your Lb01 IP or domain

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://energy_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Show which backend handled the request (useful for testing LB)
        add_header         X-Served-By       $upstream_addr always;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ── Webhook proxy ──────────────────────────────────────────────────────
    location /webhook/ {
        proxy_pass         http://energy_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Root redirect — send bare / to /app (avoids redirect loop) ───────────
    location = / {
        return 302 /app;
    }

    # ── Frontend & all other paths — proxy without URI rewriting ───────────────
    location / {
        proxy_pass         http://energy_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Health check — responds directly from Nginx (no upstream needed) ──────
    location /health {
        access_log  off;
        add_header  Content-Type application/json;
        return 200  '{"status":"ok","service":"nginx-lb"}';
    }

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip            on;
    gzip_types      application/json text/css application/javascript;
    gzip_min_length 1024;
}
