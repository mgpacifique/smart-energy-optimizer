name: Deploy to Web01 & Web02

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi pydantic httpx python-dotenv pandas numpy --quiet

      - name: Run import tests
        run: |
          cd backend
          python -c "from data_gen import generate; print('data_gen OK')"
          python -c "from weather import fetch_forecast; print('weather OK')"
          python -c "from webhook import build_shed_schedule; print('webhook OK')"
          python -c "from alerts import dispatch_alert; print('alerts OK')"
          python -c "from eia_loader import generate; print('eia_loader OK')"
          echo "All import tests passed."

  # ── Job 2: Validate secrets before attempting SSH ────────────────────────────
  validate-secrets:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check required secrets are set
        run: |
          MISSING=""
          [ -z "${{ secrets.WEB01_HOST }}"       ] && MISSING="$MISSING WEB01_HOST"
          [ -z "${{ secrets.WEB02_HOST }}"       ] && MISSING="$MISSING WEB02_HOST"
          [ -z "${{ secrets.LB01_HOST }}"        ] && MISSING="$MISSING LB01_HOST"
          [ -z "${{ secrets.SSH_USER }}"         ] && MISSING="$MISSING SSH_USER"
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}"  ] && MISSING="$MISSING SSH_PRIVATE_KEY"

          if [ -n "$MISSING" ]; then
            echo ""
            echo "ERROR: The following GitHub Secrets are missing or empty:"
            for s in $MISSING; do echo "  - $s"; done
            echo ""
            echo "Fix: Go to your repo -> Settings -> Secrets and variables"
            echo "     -> Actions -> New repository secret"
            echo ""
            exit 1
          fi
          echo "All required secrets are present."

  # ── Job 3: Deploy to Web01 ───────────────────────────────────────────────────
  deploy-web01:
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Web01
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WEB01_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          timeout:  60s
          script: |
            set -e
            echo "=== Web01 deployment starting ==="

            # Clone repo if not present
            if [ ! -d "$HOME/smart-energy-optimizer" ]; then
              echo "Cloning repository..."
              git clone https://github.com/mgpacifique/smart-energy-optimizer.git \
                $HOME/smart-energy-optimizer
            fi

            cd $HOME/smart-energy-optimizer
            git pull origin main

            # Create .env if missing
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              echo "NOTE: backend/.env created from example — fill in your API keys."
            fi

            # Bootstrap data + model on first deploy
            if [ ! -f backend/models/prophet_model.pkl ]; then
              echo "First deploy — bootstrapping data and model..."
              docker compose -f docker-compose.prod.yml run --rm api \
                python3 -c "from eia_loader import generate; generate()"
              docker compose -f docker-compose.prod.yml run --rm api \
                python3 -c "from forecaster import ProphetForecaster; ProphetForecaster().train()"
            fi

            # Restart services
            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Web01 deployment complete ==="
            docker compose -f docker-compose.prod.yml ps

  # ── Job 4: Deploy to Web02 ───────────────────────────────────────────────────
  deploy-web02:
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Web02
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WEB02_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          timeout:  60s
          script: |
            set -e
            echo "=== Web02 deployment starting ==="

            if [ ! -d "$HOME/smart-energy-optimizer" ]; then
              echo "Cloning repository..."
              git clone https://github.com/mgpacifique/smart-energy-optimizer.git \
                $HOME/smart-energy-optimizer
            fi

            cd $HOME/smart-energy-optimizer
            git pull origin main

            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
            fi

            if [ ! -f backend/models/prophet_model.pkl ]; then
              echo "First deploy — bootstrapping..."
              docker compose -f docker-compose.prod.yml run --rm api \
                python3 -c "from eia_loader import generate; generate()"
              docker compose -f docker-compose.prod.yml run --rm api \
                python3 -c "from forecaster import ProphetForecaster; ProphetForecaster().train()"
            fi

            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Web02 deployment complete ==="
            docker compose -f docker-compose.prod.yml ps

  # ── Job 5: Verify load balancer ──────────────────────────────────────────────
  verify-lb:
    runs-on: ubuntu-latest
    needs: [deploy-web01, deploy-web02]
    steps:
      - name: Wait for services to be ready
        run: sleep 20

      - name: Health check via load balancer
        run: |
          echo "Checking load balancer at ${{ secrets.LB01_HOST }}..."
          for i in {1..6}; do
            RESPONSE=$(curl -sf --max-time 10 http://${{ secrets.LB01_HOST }}/ || echo "FAILED")
            echo "Request $i: $RESPONSE"
          done

      - name: Confirm X-Served-By alternates between servers
        run: |
          echo "Checking traffic distribution..."
          for i in {1..6}; do
            curl -sf -I --max-time 10 http://${{ secrets.LB01_HOST }}/api/ \
              | grep -i "X-Served-By" || echo "  (header not present)"
          done
          echo "Load balancer verification complete."
