name: Deploy to Web01 & Web02

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Lightweight syntax-only tests ─────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install only what tests need
        run: |
          pip install fastapi pydantic python-dotenv --quiet

      - name: Syntax check all backend files
        run: |
          cd backend
          python -m py_compile main.py       && echo "main.py OK"
          python -m py_compile forecaster.py && echo "forecaster.py OK"
          python -m py_compile lstm_model.py && echo "lstm_model.py OK"
          python -m py_compile webhook.py    && echo "webhook.py OK"
          python -m py_compile alerts.py     && echo "alerts.py OK"
          python -m py_compile eia_loader.py && echo "eia_loader.py OK"
          python -m py_compile weather.py    && echo "weather.py OK"
          python -m py_compile scheduler.py  && echo "scheduler.py OK"
          python -m py_compile evaluate.py   && echo "evaluate.py OK"
          echo "All syntax checks passed."

  # ── Job 2: Validate secrets ───────────────────────────────────────────────
  validate-secrets:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check all required secrets are set
        run: |
          MISSING=""
          [ -z "${{ secrets.WEB01_HOST }}"      ] && MISSING="$MISSING WEB01_HOST"
          [ -z "${{ secrets.WEB02_HOST }}"      ] && MISSING="$MISSING WEB02_HOST"
          [ -z "${{ secrets.LB01_HOST }}"       ] && MISSING="$MISSING LB01_HOST"
          [ -z "${{ secrets.SSH_USER }}"        ] && MISSING="$MISSING SSH_USER"
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && MISSING="$MISSING SSH_PRIVATE_KEY"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing secrets:$MISSING"
            echo "Go to: Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "All secrets present."

  # ── Job 3: Deploy Web01 ───────────────────────────────────────────────────
  deploy-web01:
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Web01
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WEB01_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          timeout:  120s
          script: |
            set -e
            cd ~/smart-energy-optimizer
            git fetch origin main
            git reset --hard origin/main
            docker cp ~/smart-energy-optimizer/frontend/. smart-energy-optimizer-api-1:/frontend/ || true
            docker compose -f docker-compose.prod.yml up -d --build --no-deps api
            echo "Web01 deployed OK"

  # ── Job 4: Deploy Web02 ───────────────────────────────────────────────────
  deploy-web02:
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Web02
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.WEB02_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          timeout:  120s
          script: |
            set -e
            cd ~/smart-energy-optimizer
            git fetch origin main
            git reset --hard origin/main
            docker cp ~/smart-energy-optimizer/frontend/. smart-energy-optimizer-api-1:/frontend/ || true
            docker compose -f docker-compose.prod.yml up -d --build --no-deps api
            echo "Web02 deployed OK"

  # ── Job 5: Verify ─────────────────────────────────────────────────────────
  verify-lb:
    runs-on: ubuntu-latest
    needs: [deploy-web01, deploy-web02]
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Health check Web01 directly
        run: curl -sf "http://${{ secrets.WEB01_HOST }}:8000/" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'" && echo "Web01 healthy"

      - name: Health check Web02 directly
        run: curl -sf "http://${{ secrets.WEB02_HOST }}:8000/" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'" && echo "Web02 healthy"

      - name: Health check through load balancer
        run: curl -sf "http://${{ secrets.LB01_HOST }}/" && echo "LB healthy"